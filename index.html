<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full-Stack Website</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Roboto', sans-serif; }
body { background:#f0f2f5; color:#333; line-height:1.6; }
header { background: linear-gradient(90deg,#007bff,#00c6ff); color:white; text-align:center; padding:60px 20px; }
header h1 { font-size:3em; }
nav { display:flex; justify-content:center; background:#0056b3; }
nav a { color:white; padding:15px 25px; text-decoration:none; font-weight:bold; transition:0.3s; }
nav a:hover { background:#004494; }
main { max-width:800px; margin:30px auto; padding:0 20px; }
section { background:white; padding:40px; margin-bottom:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
section img { max-width:100%; border-radius:10px; margin-bottom:20px; }
.btn { display:inline-block; padding:10px 25px; background:#007bff; color:white; text-decoration:none; border-radius:5px; transition:0.3s; }
.btn:hover { background:#0056b3; }
footer { background:#333; color:white; text-align:center; padding:20px 0; margin-top:30px; }
form input, form textarea { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
form button { padding:10px 20px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
form button:hover { background:#0056b3; }
</style>
</head>
<body>

<header>
  <h1>Full-Stack Website</h1>
  <p>Frontend + Backend Example</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<main>
  <section id="home">
    <h2>Welcome</h2>
    <p>This is a simple full-stack website example using Node.js and Express.</p>
  </section>

  <section id="about">
    <h2>About</h2>
    <p>We create full-stack apps with frontend and backend functionality.</p>
  </section>

  <section id="contact">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <p id="responseMsg"></p>
  </section>
</main>

<footer>
  &copy; 2026 Full-Stack Website
</footer>

<script>
const form = document.getElementById('contactForm');
const responseMsg = document.getElementById('responseMsg');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const data = Object.fromEntries(formData);

    try {
        const response = await fetch('/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        responseMsg.textContent = result.message;
        form.reset();
    } catch(err) {
        responseMsg.textContent = 'Error sending message!';
    }
});
</script>

</body>
</html>
